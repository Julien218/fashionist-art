name: 🔍 CI — Fashionist ART Dour

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: 🏗️ Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
        continue-on-error: true
      - run: npm run build
        env:
          NODE_ENV: production
      - name: ✅ Build réussi
        run: echo "Build OK — Railway déploie automatiquement depuis GitHub"
