name: 🚀 CI/CD — Fashionist ART Dour

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: 🏗️ Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint
        continue-on-error: true

      - name: 🏗️ Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: ✅ Build OK
        run: echo "🎨 Fashionist ART Dour — build réussi"

  deploy:
    name: 🚂 Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == "refs/heads/main" || github.ref == "refs/heads/master"
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚂 Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: fashionist-art

      - name: ✅ Deployed
        run: echo "🚀 Fashionist ART Dour déployé sur Railway — Js-Innov.IA"
